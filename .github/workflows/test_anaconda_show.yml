name: anaconda show 
on: 
  workflow_dispatch:

jobs:
  show-anaconda-package:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: '3.11'

    - name: Install anaconda-client
      shell: bash -l {0}
      run: conda install -y -c anaconda anaconda-client

    - name: Run anaconda show
      shell: bash -l {0}
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
      run: |
        anaconda show fermi/fermitools

